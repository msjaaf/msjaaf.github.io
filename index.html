<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مِسجاف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('frames/frame_0130.webp');
      background-size: cover;
      background-position: center;
    }

    #brand {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    .brand-name {
      font-family: 'Aref Ruqaa', serif;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 700;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 80px rgba(255,255,255,0.15);
      opacity: 0;
      transform: translateY(40px);
    }

    .buy-link {
      font-family: 'Aref Ruqaa', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      font-weight: 400;
      color: #fff;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.6);
      padding: 0.8rem 3rem;
      opacity: 0;
      transform: translateY(25px);
      transition: background 0.3s ease, color 0.3s ease;
      cursor: pointer;
    }

    .buy-link:hover {
      background: #fff;
      color: #0a0a0a;
    }

    @media (max-width: 768px) {
      .brand-name { font-size: clamp(3rem, 14vw, 5rem); }
      .buy-link   { font-size: 1.1rem; padding: 0.7rem 2.2rem; }
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="brand">
    <h1 class="brand-name">مِسجاف</h1>
    <a href="https://5ocwcn.zid.store/" class="buy-link" target="_blank" rel="noopener">للطلب</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    window.addEventListener('load', function () {
      gsap.to('.brand-name', {
        opacity: 1, y: 0,
        duration: 1.2,
        ease: 'power3.out',
        delay: 0.3
      });
      gsap.to('.buy-link', {
        opacity: 1, y: 0,
        duration: 1.0,
        ease: 'power3.out',
        delay: 0.8
      });
    });
  </script>

</body>
</html>
